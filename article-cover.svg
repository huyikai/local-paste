<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a0c4ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" rx="0" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#e94560" opacity="0.08"/>
  <circle cx="150" cy="550" r="250" fill="#f5a623" opacity="0.06"/>
  <circle cx="900" cy="500" r="120" fill="#a0c4ff" opacity="0.05"/>

  <!-- Clipboard icon -->
  <g transform="translate(155, 195) scale(1.6)">
    <!-- Clipboard body -->
    <rect x="0" y="20" width="80" height="110" rx="10" fill="none" stroke="url(#accent)" stroke-width="3.5"/>
    <!-- Clipboard clip -->
    <rect x="25" y="5" width="30" height="30" rx="6" fill="none" stroke="url(#accent)" stroke-width="3.5"/>
    <!-- Text lines inside clipboard -->
    <line x1="18" y1="48" x2="62" y2="48" stroke="#a0c4ff" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <line x1="18" y1="65" x2="55" y2="65" stroke="#a0c4ff" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="18" y1="82" x2="60" y2="82" stroke="#a0c4ff" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="18" y1="99" x2="40" y2="99" stroke="#a0c4ff" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <!-- Checkmark -->
    <path d="M55 95 l10 10 l18-20" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="330" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)" letter-spacing="-1">
    LocalPaste
  </text>

  <!-- Tagline -->
  <text x="335" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#8892b0">
    macOS 原生剪贴板历史管理器
  </text>

  <!-- Divider line -->
  <line x1="335" y1="345" x2="535" y2="345" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <!-- Feature pills -->
  <g transform="translate(335, 385)" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="#e94560" opacity="0.15"/>
    <text x="65" y="24" text-anchor="middle" fill="#e94560">🔒 100% 离线</text>

    <rect x="145" y="0" width="115" height="36" rx="18" fill="#f5a623" opacity="0.15"/>
    <text x="202" y="24" text-anchor="middle" fill="#f5a623">⚡ ~30MB</text>

    <rect x="275" y="0" width="100" height="36" rx="18" fill="#4ade80" opacity="0.15"/>
    <text x="325" y="24" text-anchor="middle" fill="#4ade80">🆓 MIT</text>
  </g>

  <!-- Bottom meta -->
  <g transform="translate(335, 460)" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8892b0">
    <text x="0" y="0">受不了 ¥98/年订阅？一个下午，Vibe Coding 自己做一个。</text>
    <text x="0" y="32" font-size="15" fill="#5a6a8a">github.com/huyikai/local-paste  ·  brew install --cask localpaste</text>
  </g>

  <!-- Bottom decorative bar -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)" opacity="0.6"/>
</svg>
